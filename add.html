<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .form-container{
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 4px 15px rgba(0,0,0,0.15);
        width:350px;
    }

    h2{
        text-align:center;
        color:#333;
        margin-bottom:20px;
    }

    label{
        font-weight:bold;
        display:block;
        margin-bottom:5px;
        color:#444;
    }

    input{
        width:100%;
        padding:10px;
        margin-bottom:15px;
        border:1px solid #ccc;
        border-radius:5px;
        outline:none;
    }

    input:focus{
        border-color:#007bff;
    }

    button{
        width:100%;
        padding:10px;
        background:#28a745;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#1e7e34;
    }
</style>
</head>

<body>

<div class="form-container">
    <h2>Add Student</h2>

    <form method="POST">
        <label>Name</label>
        <input type="text" name="name">

        <label>Age</label>
        <input type="number" name="age">

        <label>Course</label>
        <input type="text" name="course">

        <button type="submit">Add Student</button>
    </form>
</div>

</body>
</html>
